<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>発音分析アドバイザー お試し版 Ver5.0a</title>
    
    <!-- 既存アプリと同じTailwind CSSを読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        /* スムーススクロール */
        html {
            scroll-behavior: smooth;
        }
        /* キャンバス用コンテナのスクロールバーを少し見やすく */
        #canvasContainer::-webkit-scrollbar {
            height: 10px;
        }
        #canvasContainer::-webkit-scrollbar-track {
            background: #1e293b; 
            border-radius: 8px;
        }
        #canvasContainer::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8 font-sans">
    
    <div class="max-w-2xl mx-auto space-y-6">
        
        <!-- メインカード -->
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 space-y-6">
            
            <h2 class="text-xl md:text-2xl font-bold text-slate-800 border-b border-slate-100 pb-4 text-center">
                🗣️ AI発音分析アドバイザー <span class="text-sm font-normal text-slate-500">v5.0a</span>
            </h2>
            
            <!-- 録音と分析 -->
            <div id="instructionText" class="text-center font-bold text-slate-700 pt-2">
                ボタンを押して、日本語を話してください。
            </div>
            
            <div id="btnContainer" class="flex flex-col gap-3 max-w-sm mx-auto w-full">
                <button id="recordBtn" class="w-full bg-red-50 text-red-600 border border-red-200 py-3.5 rounded-xl text-sm md:text-base font-bold hover:bg-red-100 transition shadow-sm active:scale-95 flex justify-center items-center gap-2">
                    🔴 録音＆可視化 スタート
                </button>
                
                <button id="analyzeBtn" class="w-full bg-emerald-500 text-white border border-emerald-600 py-3.5 rounded-xl text-sm md:text-base font-bold hover:bg-emerald-600 transition shadow-sm active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2" disabled>
                    🤖 Geminiで発音を分析
                </button>
            </div>
            
            <div id="ojadLinkContainer" class="text-center">
                <a href="https://www.gavo.t.u-tokyo.ac.jp/ojad/vie/phrasing/index" target="_blank" class="inline-block w-full max-w-sm bg-slate-600 text-white py-3 rounded-xl text-sm font-bold hover:bg-slate-700 transition shadow-sm active:scale-95 text-center">
                    📖 OJADでアクセント見本を確認する
                </a>
            </div>

            <!-- キャンバス（波形描画） -->
            <div id="canvasContainer" class="w-full overflow-x-auto rounded-xl border-4 border-slate-800 bg-slate-900 shadow-inner scroll-smooth">
                <canvas id="canvas" height="200" class="block"></canvas>
            </div>
            
            <!-- 分析結果 -->
            <div class="space-y-3 pt-2">
                <h3 id="resultHeading" class="text-lg md:text-xl font-bold text-slate-800 border-b border-slate-100 pb-2 flex flex-col md:flex-row md:items-baseline gap-1">
                    🤖 AIの分析フィードバック
                    <span class="text-sm font-normal text-slate-500">(Kết quả phân tích)</span>
                </h3>
                <div id="result" class="bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-200 whitespace-pre-wrap text-sm md:text-base text-slate-700 leading-relaxed min-h-[120px] shadow-inner">ここにGeminiからのアドバイスが表示されます。</div>
            </div>

        </div>
        
        <div class="w-full text-center text-slate-500 pb-4">
            <p class="text-xs">&copy; 2026 ITM Group, All rights reserved.</p>
        </div>
    </div>

<script>
    const recordBtn = document.getElementById('recordBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const canvas = document.getElementById('canvas');
    const canvasCtx = canvas.getContext('2d');
    const canvasContainer = document.getElementById('canvasContainer');
    const resultDiv = document.getElementById('result');
    
    const btnContainer = document.getElementById('btnContainer');
    const instructionText = document.getElementById('instructionText');
    const ojadLinkContainer = document.getElementById('ojadLinkContainer');

    // ★ 定数としてAPIキーを埋め込み
    const API_KEY = "AQ.Ab8RN6JV_ebj0SNZmWOJQPLBsU2drK-QlmxwIIastfWB_o54_w";

    let audioContext;
    let analyser;
    let microphone;
    let mediaRecorder;
    let audioChunks = [];
    let audioBlob;
    let isRecording = false;
    let animationFrameId;
    let activeStream = null;

    let xIdx = 0;
    let lastY = null; 
    let pitchHistory = [];
    const SMOOTH_WINDOW = 5;

    window.externalAudioData = null;

    // ==========================================
    // 1. Geminiによる分析実行関数（共通化）
    // ==========================================
    async function runAnalysis(base64Audio, targetText = "") {
        // ローディング表示（Tailwindのアニメーションを使用）
        resultDiv.innerHTML = '<div class="flex flex-col items-center justify-center space-y-2 text-orange-600 animate-pulse font-bold py-6"><span class="text-2xl">⏳</span><span>Gemini đang lắng nghe và phân tích...</span><span class="text-sm font-normal text-slate-500">(AIが音声を解析中です。数秒お待ちください...)</span></div>';
        analyzeBtn.disabled = true; 
        recordBtn.disabled = true;

        let promptText = "あなたは日本語音声指導コンサルタントです。添付されたユーザーの録音音声を直接聴き、日本語の高低アクセント（ピッチアクセント）やリズム、イントネーションの美しさを分析してください。\n";
        if (targetText) {
            promptText += `ユーザーは「${targetText}」という文章を発音しようとしています。これを踏まえて、以下のフォーマットに厳密に従って出力してください。\n\n`;
        } else {
            promptText += `何という言葉を発音しようとしたかを察した上で、以下のフォーマットに厳密に従って出力してください。\n\n`;
        }
        
        promptText += "【重要ルール】\n" +
                      "1. 最初に必ず『【Tiếng Việt (Tiếng Việt)】』という見出しを付け、ベトナム語で「認識した言葉」「アクセント・プロソディの評価」「具体的なアドバイス」を300から400字程度で初心者に親切でわかりやすく書いてください。\n" +
                      "2. その次に必ず『【日本語】』という見出しを付け、全く同じ内容の評価とアドバイスを日本語で書いてください。\n\n" +
                      "ベトナム語のアドバイスは、ベトナム人の初級日本語学習者が必ず理解できるよう、優しく、そして、できるだけ基礎的でおおまかに、「専門的すぎない」アドバイスを心がけてください。";

        try {
            const requestBody = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inlineData: { mimeType: "audio/webm", data: base64Audio } }
                    ]
                }]
            };

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                resultDiv.textContent = data.candidates[0].content.parts[0].text;
            } else if (data.error) {
                resultDiv.textContent = `APIエラー: ${data.error.message}`;
            } else {
                resultDiv.textContent = "Không thể lấy kết quả phân tích. Vui lòng thử lại. (分析結果の取得に失敗しました)";
            }
        } catch (innerErr) {
            alert("通信エラーが発生しました:\n" + innerErr.message);
            resultDiv.textContent = "通信エラーが発生しました。インターネット接続を確認してください。";
        } finally {
            analyzeBtn.disabled = false;
            recordBtn.disabled = false;
            
            // 処理完了後にUIを再表示
            btnContainer.classList.remove('hidden');
            canvasContainer.classList.remove('hidden');
            ojadLinkContainer.classList.remove('hidden');
            recordBtn.classList.remove('hidden');
            instructionText.classList.remove('hidden');

            // アドバイス部分（見出し）へ自動スクロール
            setTimeout(() => {
                const heading = document.getElementById('resultHeading');
                if (heading) {
                    heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 100);
        }
    }

    // ==========================================
    // 2. 外部からのデータ受け取り＆自動実行処理
    // ==========================================
    window.addEventListener('DOMContentLoaded', () => {
        const targetText = sessionStorage.getItem('analysisTargetText');
        const audioDataBase64 = sessionStorage.getItem('analysisAudioData');

        if (targetText && audioDataBase64) {
            recordBtn.classList.add('hidden'); 
            instructionText.classList.add('hidden'); 
            btnContainer.classList.add('hidden'); 
            canvasContainer.classList.add('hidden'); 
            ojadLinkContainer.classList.add('hidden'); 
            
            const base64Data = audioDataBase64.includes(',') ? audioDataBase64.split(',')[1] : audioDataBase64;

            window.externalAudioData = {
                base64Audio: base64Data,
                targetText: targetText
            };
            analyzeBtn.disabled = false;

            runAnalysis(base64Data, targetText);

            sessionStorage.removeItem('analysisTargetText');
            sessionStorage.removeItem('analysisAudioData');
        }
    });

    // ==========================================
    // 3. 分析ボタンの手動クリック処理
    // ==========================================
    analyzeBtn.addEventListener('click', async () => {
        if (window.externalAudioData) {
            runAnalysis(window.externalAudioData.base64Audio, window.externalAudioData.targetText);
            return;
        }

        if (!audioBlob) {
            alert("録音データがありません。先に録音を行ってください。");
            return;
        }

        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = () => {
            const base64Audio = reader.result.split(',')[1];
            runAnalysis(base64Audio, ""); 
        };
    });

    // ==========================================
    // 4. ローカルでの録音と波形描画の処理
    // ==========================================
    recordBtn.addEventListener('click', async () => {
        try {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            // 【録音停止処理】
            if (isRecording) {
                isRecording = false;
                
                // ボタンのデザインを元に戻す (Tailwindクラス切り替え)
                recordBtn.innerHTML = "🔴 録音＆可視化 スタート";
                recordBtn.className = "w-full bg-red-50 text-red-600 border border-red-200 py-3.5 rounded-xl text-sm md:text-base font-bold hover:bg-red-100 transition shadow-sm active:scale-95 flex justify-center items-center gap-2";
                
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                }
                
                if (activeStream) {
                    activeStream.getTracks().forEach(track => track.stop());
                    activeStream = null;
                }
                
                // キャンバスを最初の位置（一番左）にスクロールして戻す
                setTimeout(() => {
                    canvasContainer.scrollLeft = 0;
                }, 100);
                
                return;
            }

            // 【録音開始処理】
            audioChunks = [];
            resultDiv.textContent = "ここにGeminiからのアドバイスが表示されます。";
            
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            activeStream = stream;
            
            isRecording = true;
            
            // ボタンを録音中デザインに変更 (Tailwindクラス切り替え)
            recordBtn.innerHTML = "⏹️ 録音を停止 (Đang ghi...)";
            recordBtn.className = "w-full bg-red-600 text-white border border-red-700 py-3.5 rounded-xl text-sm md:text-base font-bold transition shadow-md active:scale-95 flex justify-center items-center gap-2 animate-pulse";
            
            analyzeBtn.disabled = true;

            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (event) => { 
                if (event.data && event.data.size > 0) audioChunks.push(event.data); 
            };
            mediaRecorder.onstop = () => {
                audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                analyzeBtn.disabled = false; 
            };
            mediaRecorder.start();

            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            microphone = audioContext.createMediaStreamSource(stream);
            microphone.connect(analyser);

            // キャンバスの初期化
            canvas.width = 550;
            canvasCtx.fillStyle = '#0f172a'; // Tailwindのslate-900に近い色
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            xIdx = 0;
            lastY = null;
            pitchHistory = [];

            function updateVisuals() {
                if (!isRecording) return;
                const array = new Float32Array(analyser.fftSize);
                analyser.getFloatTimeDomainData(array);
                
                let pitch = autoCorrelate(array, audioContext.sampleRate);
                
                if (pitch !== -1 && pitch > 80 && pitch < 500) {
                    pitchHistory.push(pitch);
                    if (pitchHistory.length > SMOOTH_WINDOW) pitchHistory.shift();
                    pitch = pitchHistory.reduce((a, b) => a + b, 0) / pitchHistory.length;
                } else {
                    pitchHistory = [];
                    pitch = -1;
                }
                
                drawLine(pitch);
                animationFrameId = requestAnimationFrame(updateVisuals);
            }
            animationFrameId = requestAnimationFrame(updateVisuals);

        } catch (err) {
            alert("録音の開始に失敗しました:\n" + err.message);
        }
    });

    function autoCorrelate(buffer, sampleRate) {
        let SIZE = buffer.length; let rms = 0;
        for (let i=0; i<SIZE; i++) { rms += buffer[i]*buffer[i]; }
        rms = Math.sqrt(rms/SIZE); if (rms<0.015) return -1;
        
        let r1=0, r2=SIZE-1, thres=0.2;
        for (let i=0; i<SIZE/2; i++) { if (Math.abs(buffer[i]) < thres) { r1 = i; break; } }
        for (let i=SIZE-1; i>=SIZE/2; i--) { if (Math.abs(buffer[i]) < thres) { r2 = i; break; } }
        if (r1 >= r2) return -1;
        buffer = buffer.slice(r1,r2); SIZE = buffer.length;
        
        let c = new Float32Array(SIZE);
        for (let i=0; i<SIZE; i++) { for (let j=0; j<SIZE-i; j++) { c[i] = c[i] + buffer[j]*buffer[j+i]; } }
        
        let d=0; while (d < SIZE - 1 && c[d] > c[d+1]) d++;
        let maxval=-1, maxpos=-1;
        for (let i=d; i<SIZE/2; i++) { if (c[i] > maxval) { maxval = c[i]; maxpos = i; } }
        let T0 = maxpos; if (T0 > 0) return sampleRate / T0; return -1;
    }

    function drawLine(pitch) {
        if (xIdx >= canvas.width - 10) { 
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(canvas, 0, 0);

            canvas.width += 500;
            canvasCtx.fillStyle = '#0f172a';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            canvasCtx.drawImage(tempCanvas, 0, 0);
        }

        if (pitch !== -1) {
            const y = canvas.height - ((pitch - 80) / (500 - 80) * canvas.height);
            
            if (lastY === null) {
                canvasCtx.beginPath();
                canvasCtx.moveTo(xIdx, y);
            } else {
                canvasCtx.lineTo(xIdx, y);
                // Tailwindのorange-400やemerald-400に近い色へ変更
                canvasCtx.strokeStyle = '#34d399'; 
                canvasCtx.lineWidth = 4;
                canvasCtx.lineCap = 'round';
                canvasCtx.lineJoin = 'round'; 
                canvasCtx.stroke();
                
                canvasCtx.beginPath();
                canvasCtx.moveTo(xIdx, y);
            }
            lastY = y;
        } else {
            canvasCtx.fillStyle = '#334155'; // Tailwind slate-700
            canvasCtx.fillRect(xIdx, canvas.height / 2, 2, 2);
            lastY = null; 
        }
        xIdx += 3;

        canvasContainer.scrollLeft = canvasContainer.scrollWidth;
    }
</script>
</body>
</html>
