<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>発音分析アドバイザー - 安定版v4.2f</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 20px; background: #f0f2f5; color: #333; }
        .container { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 90%; max-width: 600px; text-align: left; }
        h2 { text-align: center; margin-top: 0; }
        .center { text-align: center; }
        
        /* 1. ベースのボタンに滑らかな動き（transition）と立体感（box-shadow）を追加 */
        button { 
            font-size: 16px; 
            padding: 12px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.2s ease; /* 色や動きの変化を0.2秒かけて滑らかにする */
            box-shadow: 0 4px 0 rgba(0,0,0,0.2); /* 下方向に影をつけて立体感を出す */
        }
        
        /* ★追加：ボタンを縦に並べるためのコンテナスタイル */
        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* ボタンの縦のすき間 */
            margin: 15px 0;
        }
        /* 縦並びの時はボタンの横幅を揃えるときれいに見えます */
        .btn-container button {
            width: 100%;
            max-width: 320px;
            margin: 0; 
        }

        /* ★追加：ボタンを隠すためのスタイル */
        .hidden {
            display: none !important;
        }
        
        #recordBtn { background-color: #007bff; color: white; }
        #recordBtn.recording { background-color: #333; }
        #analyzeBtn { background-color: #28a745; color: white; }
        
        /* 2. マウスが乗った時（ホバー時）に色を少し濃くする */
        #recordBtn:hover:not(:disabled) {
            background-color: #0056b3; /* 元の青より少し濃い青 */
        }
        #analyzeBtn:hover:not(:disabled) {
            background-color: #218838; /* 元の緑より少し濃い緑 */
        }
        
        /* 3. クリックした時（アクティブ時）にボタンが沈む効果 */
        button:active:not(:disabled) {
            transform: translateY(4px); /* 影の高さ(4px)と同じ分だけ下に移動させる */
            box-shadow: 0 0 0 rgba(0,0,0,0); /* 影を消すことで、地面に付いた（沈んだ）ように見せる */
        }
        
        /* 4. 非アクティブ（disabled）の時は影を消し、ホバーやクリックが反応しないようにする */
        #analyzeBtn:disabled { 
            background-color: #ccc; 
            cursor: not-allowed; 
            box-shadow: none; /* 立体感をなくす */
            transform: none;  /* 沈まないようにする */
        }
        
        /* 5. キャンバスを囲むコンテナ：ここで横スクロールを許可します */
        #canvasContainer { 
            width: 100%; 
            max-width: 550px; 
            overflow-x: auto; /* 横幅を超えたらスクロールバーを出す */
            margin: 15px auto; 
            border-radius: 5px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            background: #111;
        }
        /* キャンバス自体のデザイン */
        #canvas { 
            display: block; 
            background: #111; 
        }
        
        .key-input-box { background: #fff3cd; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #ffeeba; }
        #apiKey { width: 80%; padding: 8px; font-size: 14px; margin-top: 5px; }
        #result { background: #f8f9fa; padding: 15px; border-radius: 5px; border-left: 5px solid #28a745; margin-top: 20px; white-space: pre-wrap; min-height: 50px; font-size: 15px; line-height: 1.6; }
        .loading { color: #666; font-style: italic; animation: blink 1s infinite; }
        .legend { display: flex; justify-content: center; gap: 15px; font-size: 14px; margin-top: 10px; }
        .color-box { display: inline-block; width: 12px; height: 12px; border-radius: 2px; margin-right: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .ojad-link-btn {
            display: inline-block;
            background-color: #6c757d;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            font-size: 14px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
        }
        .ojad-link-btn:hover {
            background-color: #5a6268;
        }
        .ojad-link-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0,0,0,0);
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🗣️ AI発音分析アドバイザー（お試し版）Ver4.2f</h2>
    
    <div class="key-input-box">
        <label for="apiKey">🔑 <strong>手順1: Gemini APIキーを入力してください</strong></label><br>
        <input type="password" id="apiKey" placeholder="AIzaSy... から始まるキーをもらって、ここに貼り付け">
    </div>

    <p class="center"><strong>手順2: ボタンを押して、日本語を話してください。</strong></p>
    
    <!-- ★修正：ボタンを縦に並べるためのクラスに変更 -->
    <div class="btn-container">
        <button id="recordBtn">🔵 録音＆可視化 スタート</button>
        <button id="analyzeBtn" disabled>🤖 Geminiで発音を分析</button>
    </div>
    
    <div class="center">
        <a href="https://www.gavo.t.u-tokyo.ac.jp/ojad/vie/phrasing/index" target="_blank" class="ojad-link-btn">📖 OJADでアクセント見本を確認する</a>
    </div>

    <div id="canvasContainer">
        <canvas id="canvas" width="550" height="200"></canvas>
    </div>
    
    <h3>🤖 AIの分析フィードバック (Kết quả phân tích):</h3>
    <div id="result">ここにGeminiからのアドバイスが表示されます。</div>

</div>

<script>
    const recordBtn = document.getElementById('recordBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const canvas = document.getElementById('canvas');
    const canvasCtx = canvas.getContext('2d');
    const canvasContainer = document.getElementById('canvasContainer');
    const resultDiv = document.getElementById('result');
    const apiKeyInput = document.getElementById('apiKey');

    let audioContext;
    let analyser;
    let microphone;
    let mediaRecorder;
    let audioChunks = [];
    let audioBlob;
    let isRecording = false;
    let animationFrameId;
    let activeStream = null;

    let xIdx = 0;
    let lastY = null; 
    let pitchHistory = [];
    const SMOOTH_WINDOW = 5;

    // ★修正箇所：外部から渡されたデータを永続的に保持する変数
    window.externalAudioData = null;

    // ==========================================
    // 1. APIキーの保存・読み込み処理
    // ==========================================
    const savedKey = localStorage.getItem('geminiApiKey');
    if (savedKey) {
        apiKeyInput.value = savedKey;
    }

    apiKeyInput.addEventListener('input', () => {
        localStorage.setItem('geminiApiKey', apiKeyInput.value.trim());
    });

    // ==========================================
    // 2. Geminiによる分析実行関数（共通化）
    // ==========================================
    async function runAnalysis(base64Audio, targetText = "") {
        const apiKey = apiKeyInput.value.trim();
        
        if (!apiKey) {
            alert("🔑 APIキーが入力されていません。\nキーを入力してから「Geminiで発音を分析」ボタンを押してください。");
            analyzeBtn.disabled = false; // ボタンは有効なまま維持する
            return;
        }

        resultDiv.innerHTML = '<span class="loading">⏳ Gemini đang lắng nghe và phân tích giọng nói của bạn... (AIが音声を解析中です...)</span>';
        analyzeBtn.disabled = true; // 処理中は連打防止で無効化
        recordBtn.disabled = true;

        let promptText = "あなたは日本語音声指導コンサルタントです。添付されたユーザーの録音音声を直接聴き、日本語の高低アクセント（ピッチアクセント）やリズム、イントネーションの美しさを分析してください。\n";
        if (targetText) {
            promptText += `ユーザーは「${targetText}」という文章を発音しようとしています。これを踏まえて、以下のフォーマットに厳密に従って出力してください。\n\n`;
        } else {
            promptText += `何という言葉を発音しようとしたかを察した上で、以下のフォーマットに厳密に従って出力してください。\n\n`;
        }
        
        promptText += "【重要ルール】\n" +
                      "1. 最初に必ず『【Tiếng Việt (Tiếng Việt)】』という見出しを付け、ベトナム語で「認識した言葉」「アクセント・プロソディの評価」「具体的なアドバイス」を300から400字程度で初心者に親切でわかりやすく書いてください。\n" +
                      "2. その次に必ず『【日本語】』という見出しを付け、全く同じ内容の評価とアドバイスを日本語で書いてください。\n\n" +
                      "ベトナム語のアドバイスは、ベトナム人の初級日本語学習者が必ず理解できるよう、優しくできるだけ基礎的で「専門的すぎない」アドバイスを心がけてください。";

        try {
            const requestBody = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inlineData: { mimeType: "audio/webm", data: base64Audio } }
                    ]
                }]
            };

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                resultDiv.textContent = data.candidates[0].content.parts[0].text;
            } else if (data.error) {
                resultDiv.textContent = `APIエラー: ${data.error.message}`;
            } else {
                resultDiv.textContent = "Không thể lấy kết quả phân tích. Vui lòng thử lại. (分析結果の取得に失敗しました)";
            }
        } catch (innerErr) {
            alert("通信エラーが発生しました:\n" + innerErr.message);
            resultDiv.textContent = "通信エラーが発生しました。インターネット接続を確認してください。";
        } finally {
            // ★処理完了後は必ず分析ボタンを有効化する
            analyzeBtn.disabled = false;
            // 録音ボタンが非表示になっていない場合のみ有効化する
            if (!recordBtn.classList.contains('hidden')) {
                recordBtn.disabled = false;
            }
        }
    }

    // ==========================================
    // 3. 外部からのデータ受け取り＆自動実行処理
    // ==========================================
    window.addEventListener('DOMContentLoaded', () => {
        const targetText = sessionStorage.getItem('analysisTargetText');
        const audioDataBase64 = sessionStorage.getItem('analysisAudioData');

        if (targetText && audioDataBase64) {
            console.log("別アプリからデータを受け取りました。解析対象:", targetText);
            
            // データを受け取った場合は録音ボタンを非表示にする
            recordBtn.classList.add('hidden');
            
            const base64Data = audioDataBase64.includes(',') ? audioDataBase64.split(',')[1] : audioDataBase64;

            // ★修正箇所：データをグローバル変数に保存（何度でも分析ボタンを押せるように）
            window.externalAudioData = {
                base64Audio: base64Data,
                targetText: targetText
            };

            // ★修正箇所：強制的に分析ボタンを有効化しておく
            analyzeBtn.disabled = false;

            // 自動で解析処理を開始
            runAnalysis(base64Data, targetText);

            // リロード時に何度も実行されないようにストレージをクリア
            sessionStorage.removeItem('analysisTargetText');
            sessionStorage.removeItem('analysisAudioData');
        } else {
            console.log("外部からの録音データはありません。待機します。");
            // データがない場合は録音ボタンは表示されたままになる
        }
    });

    // ==========================================
    // 4. 分析ボタンの手動クリック処理
    // ==========================================
    analyzeBtn.addEventListener('click', async () => {
        // ★修正箇所：外部データが存在する場合は、何度でもそれを使う（データをnullで消去しない）
        if (window.externalAudioData) {
            runAnalysis(window.externalAudioData.base64Audio, window.externalAudioData.targetText);
            return;
        }

        // このページで手動録音した場合の処理
        if (!audioBlob) {
            alert("録音データがありません。先に録音を行ってください。");
            return;
        }

        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = () => {
            const base64Audio = reader.result.split(',')[1];
            runAnalysis(base64Audio, ""); 
        };
    });

    // ==========================================
    // 5. ローカルでの録音と波形描画の処理
    // ==========================================
    recordBtn.addEventListener('click', async () => {
        try {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            if (isRecording) {
                isRecording = false;
                recordBtn.textContent = "🔵 録音＆可視化 スタート";
                recordBtn.classList.remove('recording');
                
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                }
                
                if (activeStream) {
                    activeStream.getTracks().forEach(track => track.stop());
                    activeStream = null;
                }
                return;
            }

            audioChunks = [];
            resultDiv.textContent = "ここにGeminiからのアドバイスが表示されます。";
            
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            activeStream = stream;
            
            isRecording = true;
            recordBtn.textContent = "⏹️ 録音を停止";
            recordBtn.classList.add('recording');
            analyzeBtn.disabled = true;

            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (event) => { 
                if (event.data && event.data.size > 0) audioChunks.push(event.data); 
            };
            mediaRecorder.onstop = () => {
                audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                analyzeBtn.disabled = false; 
            };
            mediaRecorder.start();

            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            microphone = audioContext.createMediaStreamSource(stream);
            microphone.connect(analyser);

            canvas.width = 550;
            canvasCtx.fillStyle = '#111';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            xIdx = 0;
            lastY = null;
            pitchHistory = [];

            function updateVisuals() {
                if (!isRecording) return;
                const array = new Float32Array(analyser.fftSize);
                analyser.getFloatTimeDomainData(array);
                
                let pitch = autoCorrelate(array, audioContext.sampleRate);
                
                if (pitch !== -1 && pitch > 80 && pitch < 500) {
                    pitchHistory.push(pitch);
                    if (pitchHistory.length > SMOOTH_WINDOW) pitchHistory.shift();
                    pitch = pitchHistory.reduce((a, b) => a + b, 0) / pitchHistory.length;
                } else {
                    pitchHistory = [];
                    pitch = -1;
                }
                
                drawLine(pitch);
                animationFrameId = requestAnimationFrame(updateVisuals);
            }
            animationFrameId = requestAnimationFrame(updateVisuals);

        } catch (err) {
            alert("録音の開始に失敗しました:\n" + err.message);
        }
    });

    function autoCorrelate(buffer, sampleRate) {
        let SIZE = buffer.length; let rms = 0;
        for (let i=0; i<SIZE; i++) { rms += buffer[i]*buffer[i]; }
        rms = Math.sqrt(rms/SIZE); if (rms<0.015) return -1;
        
        let r1=0, r2=SIZE-1, thres=0.2;
        for (let i=0; i<SIZE/2; i++) { if (Math.abs(buffer[i]) < thres) { r1 = i; break; } }
        for (let i=SIZE-1; i>=SIZE/2; i--) { if (Math.abs(buffer[i]) < thres) { r2 = i; break; } }
        if (r1 >= r2) return -1;
        buffer = buffer.slice(r1,r2); SIZE = buffer.length;
        
        let c = new Float32Array(SIZE);
        for (let i=0; i<SIZE; i++) { for (let j=0; j<SIZE-i; j++) { c[i] = c[i] + buffer[j]*buffer[j+i]; } }
        
        let d=0; while (d < SIZE - 1 && c[d] > c[d+1]) d++;
        let maxval=-1, maxpos=-1;
        for (let i=d; i<SIZE/2; i++) { if (c[i] > maxval) { maxval = c[i]; maxpos = i; } }
        let T0 = maxpos; if (T0 > 0) return sampleRate / T0; return -1;
    }

    function drawLine(pitch) {
        if (xIdx >= canvas.width - 10) { 
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(canvas, 0, 0);

            canvas.width += 500;
            canvasCtx.fillStyle = '#111';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            canvasCtx.drawImage(tempCanvas, 0, 0);
        }

        if (pitch !== -1) {
            const y = canvas.height - ((pitch - 80) / (500 - 80) * canvas.height);
            
            if (lastY === null) {
                canvasCtx.beginPath();
                canvasCtx.moveTo(xIdx, y);
            } else {
                canvasCtx.lineTo(xIdx, y);
                canvasCtx.strokeStyle = '#00ffcc'; 
                canvasCtx.lineWidth = 4;
                canvasCtx.lineCap = 'round';
                canvasCtx.lineJoin = 'round'; 
                canvasCtx.stroke();
                
                canvasCtx.beginPath();
                canvasCtx.moveTo(xIdx, y);
            }
            lastY = y;
        } else {
            canvasCtx.fillStyle = '#444';
            canvasCtx.fillRect(xIdx, canvas.height / 2, 2, 2);
            lastY = null; 
        }
        xIdx += 3;

        canvasContainer.scrollLeft = canvasContainer.scrollWidth;
    }
</script>
</body>
</html>
