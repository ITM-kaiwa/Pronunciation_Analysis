<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pitchyによる高精度ピッチ可視化</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        canvas { border: 1px solid #ccc; background-color: #f9f9f9; width: 800px; height: 300px; }
        button { font-size: 1.2rem; padding: 10px 20px; cursor: pointer; }
        #pitchValue { font-size: 1.5rem; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <button id="startButton">マイクを有効にする</button>
    <div id="pitchValue">-- Hz</div>
    <canvas id="pitchCanvas" width="800" height="300"></canvas>

    <script type="module">
        // ESM（ES Modules）を使用して、CDNから直接インポート
        import { PitchDetector } from "https://esm.sh/pitchy@4.0.0";

        const startButton = document.getElementById('startButton');
        const pitchValueDisplay = document.getElementById('pitchValue');
        const canvas = document.getElementById('pitchCanvas');
        const ctx = canvas.getContext('2d');

        let audioContext;
        let analyser;
        let detector;
        let isRunning = false;
        
        // 描画用の履歴配列
        const pitchHistory = new Array(canvas.width).fill(null);

        startButton.addEventListener('click', async () => {
            if (isRunning) return;

            try {
                // マイクの使用許可を求める
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048; // 解析の細かさ
                
                const microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                // --- ここでPitchyの検出器を初期化 ---
                detector = PitchDetector.forFloat32Array(analyser.fftSize);
                
                isRunning = true;
                startButton.textContent = "音声取得中...";
                startButton.disabled = true;

                updatePitch();

            } catch (err) {
                alert("エラー: " + err.message);
            }
        });

        function updatePitch() {
            if (!isRunning) return;

            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);

            // --- Pitchyを使ってピッチと確信度を取得 ---
            const [pitch, clarity] = detector.findPitch(buffer, audioContext.sampleRate);

            // 確信度が 85%（0.85）以上、かつ常識的な話し声の範囲（50〜500Hz）のみを有効とする
            const isValidPitch = clarity > 0.85 && pitch >= 50 && pitch <= 500;

            pitchHistory.shift();
            pitchHistory.push(isValidPitch ? pitch : null);

            if (isValidPitch) {
                pitchValueDisplay.textContent = `${Math.round(pitch)} Hz (確信度: ${Math.round(clarity * 100)}%)`;
            } else {
                pitchValueDisplay.textContent = '-- Hz';
            }

            drawPitchGraph();
            requestAnimationFrame(updatePitch);
        }

        // キャンバスへの描画処理
        function drawPitchGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.strokeStyle = '#00E676'; // 視認性の高いグリーン
            ctx.lineWidth = 3;

            // 縦軸（周波数）の範囲
            const minFreq = 50;
            const maxFreq = 400;
            let started = false;

            for (let i = 0; i < pitchHistory.length; i++) {
                const pitch = pitchHistory[i];
                if (pitch !== null) {
                    let y = canvas.height - ((pitch - minFreq) / (maxFreq - minFreq)) * canvas.height;
                    y = Math.max(0, Math.min(canvas.height, y)); // 枠外にはみ出させない

                    if (!started) {
                        ctx.moveTo(i, y);
                        started = true;
                    } else {
                        ctx.lineTo(i, y);
                    }
                } else {
                    started = false; // 音が途切れたら線を引くのを一度ストップ
                }
            }
            ctx.stroke();
        }
    </script>
</body>
</html>
